version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: x-news-postgres
    environment:
      POSTGRES_USER: xnews
      POSTGRES_PASSWORD: xnews_password
      POSTGRES_DB: xnews_digest
    ports:
      - "5433:5432"  # 使用 5433 避免端口冲突
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xnews"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: x-news-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x-news-app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://xnews:xnews_password@postgres:5432/xnews_digest
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x-news-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://xnews:xnews_password@postgres:5432/xnews_digest
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x-news-beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://xnews:xnews_password@postgres:5432/xnews_digest
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

volumes:
  postgres_data:
